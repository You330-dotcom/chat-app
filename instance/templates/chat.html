<script>
  const ws = new WebSocket(
      (location.protocol === "https:" ? "wss://" : "ws://") +
      window.location.host +
      "/ws"
  );

  ws.onopen = () => {
      console.log("WS OPEN");
  };

  ws.onerror = (e) => {
      console.log("WS ERROR", e);
  };

  const messagesBox = document.getElementById("messages");
  const input = document.getElementById("message");
  const sendBtn = document.getElementById("send");

  sendBtn.onclick = () => {
      console.log("SEND CLICKED");

      const text = input.value;
      if (text.trim() === "") return;

      ws.send(JSON.stringify({
          action: "send_message",
          content: text,
          username: CURRENT_USER
      }));

      input.value = "";
  };

  ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === "new_message") {
          const row = document.createElement("div");
          row.className = (data.username === CURRENT_USER) ? "msg-row me" : "msg-row other";

          row.innerHTML = `
              <div class="name">${data.username}</div>
              <div class="bubble" data-id="${data.id}">${data.content}</div>
              <div class="time">${data.time}</div>
              <div class="read-toggle" onclick="toggleRead('${data.id}')">
                  既読を見る ▼
              </div>
              <div class="read-list" id="read-${data.id}" style="display:none;"></div>
          `;

          messagesBox.appendChild(row);
          messagesBox.scrollTop = messagesBox.scrollHeight;

          if (data.username !== CURRENT_USER) {
              ws.send(JSON.stringify({
                  action: "message_displayed",
                  message_id: data.id,
                  username: CURRENT_USER
              }));
          }
      }

      if (data.type === "read_message") {
          const list = document.getElementById("read-" + data.message_id);
          if (!list) return;

          const items = list.querySelectorAll(".read");
          for (let r of items) {
              if (r.textContent.includes(data.username)) return;
          }

          const read = document.createElement("div");
          read.className = "read";
          read.textContent = data.username;
          list.appendChild(read);
      }
  };

  function toggleRead(id) {
      const box = document.getElementById("read-" + id);
      box.style.display = (box.style.display === "none") ? "block" : "none";
  }
</script>
