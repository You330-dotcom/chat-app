<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チャット</title>

<style>
  body { font-family: sans-serif; background: #f0f4f8; margin: 0; display: flex; flex-direction: column; height: 100vh; }
  header { background: #4a90e2; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 1.2rem; }
  header a { color:white; text-decoration:none; font-size:1.1rem; }

  .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; }
  .msg-row { display:flex; flex-direction:column; margin-bottom: 1rem; }
  .msg-row.me { align-items:flex-end; }
  .msg-row.other { align-items:flex-start; }

  .name { font-size:0.9rem; color:#888; margin-bottom:2px; }
  .bubble { max-width:65%; padding:0.8rem 1.2rem; border-radius:16px; font-size:1.1rem; line-height:1.5; }
  .me .bubble { background:#4a90e2; color:white; border-bottom-right-radius:4px; }
  .other .bubble { background:white; color:#333; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }

  .time { font-size:0.8rem; color:#aaa; margin-top:2px; }
  .read { font-size:0.8rem; color:#4a90e2; margin-top:2px; }

  .input-area {
      background: white;
      padding: 1rem;
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid #e0e0e0;
  }

  .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 1.1rem;
  }

  .input-area button {
      padding: 12px 24px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1.1rem;
  }

  .read-toggle {
      font-size: 0.8rem;
      color: #4a90e2;
      cursor: pointer;
      margin-top: 4px;
      user-select: none;
  }

  .read-list {
      margin-top: 4px;
      padding-left: 8px;
  }
</style>
</head>

<body>

<header>
  <h1>チャット</h1>
  <a href="/dashboard">戻る</a>
</header>

<script>
  const CURRENT_USER = "{{ current_user.username }}";
</script>

<div class="messages" id="messages">
  {% for msg in messages %}
    <div class="msg-row {% if msg.user_id == current_user.id %}me{% else %}other{% endif %}">
      <div class="name">{{ msg.user.username }}</div>
      <div class="bubble" data-id="{{ msg.id }}">{{ msg.content }}</div>
      <div class="time">{{ msg.timestamp.strftime("%H:%M") }}</div>

      <div class="read-toggle" onclick="toggleRead('{{ msg.id }}')">
        既読を見る ▼
      </div>

      <div class="read-list" id="read-{{ msg.id }}" style="display:none;">
        {% for name in msg.reads | map(attribute='user.username') | list | unique %}
          <div class="read">{{ name }}</div>
        {% endfor %}
      </div>
    </div>
  {% endfor %}
</div>

<div class="input-area">
  <input id="message" type="text" placeholder="メッセージを入力…">
  <button id="send">送信</button>
</div>

<script>
  const ws = new WebSocket(
      (location.protocol === "https:" ? "wss://" : "ws://") +
      window.location.host +
      "/ws"
  );

  ws.onopen = () => {
      console.log("WS OPEN");
  };

  ws.onerror = (e) => {
      console.log("WS ERROR", e);
  };

  const messagesBox = document.getElementById("messages");
  const input = document.getElementById("message");
  const sendBtn = document.getElementById("send");

  sendBtn.onclick = () => {
      console.log("SEND CLICKED");

      const text = input.value;
      if (text.trim() === "") return;

      ws.send(JSON.stringify({
          action: "send_message",
          content: text,
          username: CURRENT_USER
      }));

      input.value = "";
  };

  ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === "new_message") {
          const row = document.createElement("div");
          row.className = (data.username === CURRENT_USER) ? "msg-row me" : "msg-row other";

          row.innerHTML = `
              <div class="name">${data.username}</div>
              <div class="bubble" data-id="${data.id}">${data.content}</div>
              <div class="time">${data.time}</div>
              <div class="read-toggle" onclick="toggleRead('${data.id}')">
                  既読を見る ▼
              </div>
              <div class="read-list" id="read-${data.id}" style="display:none;"></div>
          `;

          messagesBox.appendChild(row);
          messagesBox.scrollTop = messagesBox.scrollHeight;

          if (data.username !== CURRENT_USER) {
              ws.send(JSON.stringify({
                  action: "message_displayed",
                  message_id: data.id,
                  username: CURRENT_USER
              }));
          }
      }

      if (data.type === "read_message") {
          const list = document.getElementById("read-" + data.message_id);
          if (!list) return;

          const items = list.querySelectorAll(".read");
          for (let r of items) {
              if (r.textContent.includes(data.username)) return;
          }

          const read = document.createElement("div");
          read.className = "read";
          read.textContent = data.username;
          list.appendChild(read);
      }
  };

  function toggleRead(id) {
      const box = document.getElementById("read-" + id);
      box.style.display = (box.style.display === "none") ? "block" : "none";
  }
</script>

</body>
</html>
