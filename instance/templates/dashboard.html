<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ダッシュボード</title>
  <style>
    body { font-family: sans-serif; background: #f0f4f8; margin: 0; font-size: 18px; }
    header { background: #4a90e2; color: white; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 1.8rem; }
    header a { color: white; text-decoration: none; font-size: 1.2rem; }
    .container { max-width: 700px; margin: 3rem auto; padding: 0 1rem; }
    h2 { color: #333; font-size: 1.8rem; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .card { background: white; border-radius: 10px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; text-decoration: none; color: #333; transition: transform 0.2s; display: block; }
    .card:hover { transform: translateY(-3px); }
    .card .icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .card h3 { margin: 0; color: #4a90e2; font-size: 1.4rem; }
    .card p { font-size: 1rem; color: #666; margin: 0.5rem 0 0; }
  </style>
</head>

<body>
<header>
  <h1>Chatアプリ</h1>
  <span>{{ username }} <a href="/logout">ログアウト</a></span>
</header>

<div class="container">
  <h2>メニュー</h2>

  <div class="cards">

    <!-- チャット -->
    <a class="card" href="/chat">
      <div class="icon">💬</div>
      <h3>チャット</h3>
      <p>リアルタイムチャットへ</p>
    </a>

    <!-- DM（まだ未実装） -->
    <a class="card" href="#">
      <div class="icon">📗</div>
      <h3>DM</h3>
      <p>（まだできてない）</p>
    </a>

  </div>
</div>

</body>
</html>
